<!DOCTYPE html>
<html>
<head>
<title>Aadil Infotech Career Portal</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6fb;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
display:flex;
align-items:center;
font-size:20px;
font-weight:600;
color:#333;
}

.logo span{
margin-left:10px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
color:#666;
}

/* FORM */

.container{
display:flex;
justify-content:center;
}

form{
background:white;
padding:30px;
width:420px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
background:#2575fc;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d5ed6;
}

.success{
text-align:center;
margin-top:15px;
color:green;
}

</style>
</head>

<body>

<header>

<div class="logo">

<svg width="34" height="34" viewBox="0 0 200 200">
<circle cx="100" cy="100" r="90" fill="#2575fc"/>
<text x="50%" y="60%" text-anchor="middle"
fill="white" font-size="90"
font-family="Segoe UI"
font-weight="bold">A</text>
</svg>

<span>Aadil Infotech – Career Portal</span>

</div>

</header>

<section class="hero">

<h1>Software Trainee Engineer</h1>
<p>Join our engineering team and build innovative cloud solutions.</p>

</section>

<div class="container">

<form id="applicationForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="file" id="resume" required>

<button type="submit">Submit Application</button>

<p id="response" class="success"></p>

</form>

</div>

<script>

document.getElementById("applicationForm").addEventListener("submit",async function(e){

e.preventDefault()

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const file=document.getElementById("resume").files[0]

const reader=new FileReader()

reader.onload=async function(){

const base64=reader.result.split(",")[1]

await fetch(
"https://se6ljjlqmd.execute-api.ap-south-1.amazonaws.com/prod/upload",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name,
email:email,
file:base64,
file_name:file.name
})
}
)

document.getElementById("response").innerText=
"We received your application. Our team will get back to you soon."

}

reader.readAsDataURL(file)

})

</script>

</body>
</html>
